<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ENADE Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="./css/styles.css"/>
</head>
<body>
<div id="loader"><div class="spin"></div></div>
<div class="toast" id="toast"></div>
<div id="auth-screen" class="screen">
  <div class="auth-card">
    <div class="auth-logo">ENADE • Revisão</div>
    <h1 class="auth-title">Checklist</h1>
    <p class="auth-sub">Entre para acompanhar seu progresso.</p>
    <div class="tabs">
      <button class="tab on" id="tab-login">Entrar</button>
      <button class="tab" id="tab-reg">Criar conta</button>
    </div>
    <div id="auth-err" class="err-box" style="display:none"></div>
    <div class="field"><label>Email</label><input type="email" id="inp-email" placeholder="voce@email.com"/></div>
    <div class="field"><label>Senha</label><input type="password" id="inp-pass" placeholder="••••••••"/></div>
    <div class="field" id="field-name" style="display:none"><label>Nome</label><input type="text" id="inp-name" placeholder="Seu nome"/></div>
    <button class="btn-primary" id="auth-btn">Entrar</button>
  </div>
</div>
<div id="app-screen" class="screen">
  <nav class="topnav">
    <span class="nav-brand">ENA<span>DE</span></span>
    <span class="nav-user" id="nav-user-email"></span>
    <button class="nav-btn" id="nav-admin-btn" style="display:none">⚙ Admin</button>
    <button class="nav-btn" id="nav-users-btn" style="display:none">👥 Alunos</button>
    <button class="nav-btn" id="nav-checklist-btn" style="display:none">← Checklist</button>
    <button class="nav-btn" id="logout-btn">Sair</button>
  </nav>
  <div id="view-checklist" class="view active">
    <div class="wrap">
      <div class="hero">
        <div class="hero-tag">Revisão rápida</div>
        <h1>Checklist interativo</h1>
        <p id="hero-greeting">Bom estudo!</p>
      </div>
      <div class="prog-bar-wrap">
        <span class="prog-nums" id="prog-nums">0 / 0</span>
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <span class="prog-pct" id="prog-pct">0%</span>
        <button class="reset-btn" id="reset-progress-btn">Reiniciar</button>
      </div>
      <div id="sections-container"></div>
    </div>
  </div>
  <div id="view-admin" class="view">
    <div class="admin-wrap">
      <div class="admin-header">
        <div>
          <h2>Painel Admin</h2>
          <p>Edite categorias e itens do checklist</p>
        </div>
        <button class="save-btn" id="save-btn">Salvar alterações</button>
      </div>
      <div class="add-cat-box">
        <input id="new-cat-input" placeholder="Nome da nova categoria…"/>
        <select id="new-cat-prio" class="generic-select">
          <option>obrigatório</option>
          <option>importante</option>
          <option>revisar</option>
          <option>atenção máxima</option>
        </select>
        <button class="add-cat-btn" id="add-cat-btn">+ Categoria</button>
      </div>
      <div id="admin-sections"></div>
    </div>
  </div>
  <div id="view-users" class="view">
    <div class="users-wrap">
      <div class="admin-header">
        <div>
          <h2>Alunos cadastrados</h2>
          <p>Progresso de cada aluno no checklist</p>
        </div>
      </div>
      <div id="users-list"><p class="muted-msg">Carregando…</p></div>
    </div>
  </div>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
