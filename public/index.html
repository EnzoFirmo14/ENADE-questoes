<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ENADE Login</title>

    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" type="image/png" href="./assets/Imagem Site Enade.png" />
  </head>
  <body>
    <div id="loader"><div class="spin"></div></div>
    <div class="toast" id="toast"></div>

    <div id="auth-screen" class="screen active">
      <div class="auth-card">
        <div class="auth-logo">ENADE Revisão</div>
        <h1 class="auth-title">Checklist</h1>
        <p class="auth-sub">Entre para acompanhar seu progresso.</p>

        <div class="tabs">
          <button class="tab on" id="tab-login">Entrar</button>
          <button class="tab" id="tab-reg">Criar conta</button>
        </div>

        <div class="err-box" id="auth-err" style="display:none"></div>

        <div class="field" id="name-field" style="display:none">
          <label for="inp-name">Nome</label>
          <input id="inp-name" type="text" placeholder="Seu nome" />
        </div>

        <div class="field" id="course-field" style="display:none">
          <label for="inp-course">Curso</label>
          <select id="inp-course" class="select-like">
            <option value="">Selecione</option>
            <option value="ADS">Análise e Desenvolvimento de Sistemas</option>
            <option value="SI">Sistemas de Informação</option>
            <option value="EC">Engenharia da Computação</option>
          </select>
        </div>

        <div class="field">
          <label for="inp-email">Email</label>
          <input id="inp-email" type="email" placeholder="seuemail@exemplo.com" />
        </div>

        <div class="field">
          <label for="inp-pass">Senha</label>
          <input id="inp-pass" type="password" placeholder="Digite sua senha" />
        </div>

        <div class="field" id="confirm-pass-field" style="display:none">
          <label for="inp-pass-confirm">Confirmar senha</label>
          <input id="inp-pass-confirm" type="password" placeholder="Digite novamente" />
        </div>

        <button class="btn-primary" id="auth-btn">Entrar</button>
      </div>
    </div>

    <script src="./js/core/env.js"></script>
    <script type="module" src="./js/page/login-page.js"></script>
  </body>
</html>
