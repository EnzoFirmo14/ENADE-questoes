<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>ENADE Checklist</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./css/styles.css"/>
  </head>
  <body>
    <div id="loader"><div class="spin"></div></div>
    <div class="toast" id="toast"></div>
    <div id="auth-screen" class="screen">
      <div class="auth-card">
        <div class="auth-logo">ENADE • Revisão</div>
        <h1 class="auth-title">Checklist</h1>
        <p class="auth-sub">Entre para acompanhar seu progresso.</p>
        <div class="tabs">
          <button class="tab on" id="tab-login">Entrar</button>
          <button class="tab" id="tab-reg">Criar conta</button>
        </div>
        <div id="auth-err" class="err-box" style="display:none"></div>
        <div class="field" id="name-field" style="display:none;">
          <label for="inp-name">Nome</label>
          <input id="inp-name" type="text" placeholder="Seu nome" />
        </div>
        <div class="field">
          <label for="inp-email">Email</label>
          <input id="inp-email" type="email" placeholder="seuemail@exemplo.com" />
        </div>
        <div class="field">
          <label for="inp-pass">Senha</label>
          <div class="pass-wrap">
            <input id="inp-pass" type="password" placeholder="Digite sua senha" />
            <button type="button" class="pass-toggle" data-toggle-pass="inp-pass">Mostrar</button>
          </div>
        </div>
        <div class="field" id="confirm-pass-field" style="display:none;">
          <label for="inp-pass-confirm">Confirmar senha</label>
          <div class="pass-wrap">
            <input id="inp-pass-confirm" type="password" placeholder="Digite a senha novamente" />
            <button type="button" class="pass-toggle" data-toggle-pass="inp-pass-confirm">Mostrar</button>
          </div>
        </div>
        <button class="btn-primary" id="auth-btn">Entrar</button>
      </div>
    </div>
    <div id="app-screen" class="screen">
      <nav class="topnav">
        <span class="nav-brand">ENA<span>DE</span></span>
        <div class="account-menu">
          <button
            class="account-trigger"
            id="account-trigger"
            type="button"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="account-dropdown"
          >
            <span class="account-name" id="nav-user-email"></span>
            <span class="account-chevron">⌄</span>
          </button>
          <div class="account-dropdown" id="account-dropdown">
            <div class="account-card">
              <div class="account-card-head">
                <strong>Minha conta</strong>
                <span>Atualize seu nome e sua senha</span>
              </div>
              <div id="account-err" class="err-box" style="display:none"></div>
              <div class="field">
                <label for="account-name-input">Nome</label>
                <input
                  id="account-name-input"
                  type="text"
                  placeholder="Seu nome"
                />
              </div>
              <div class="field">
                <label for="account-pass-input">Nova senha</label>
                <div class="pass-wrap">
                  <input
                    id="account-pass-input"
                    type="password"
                    placeholder="Digite a nova senha"
                  />
                  <button
                    type="button"
                    class="pass-toggle"
                    data-toggle-pass="account-pass-input"
                  >
                    Mostrar
                  </button>
                </div>
              </div>
              <div class="field">
                <label for="account-pass-confirm-input">Confirmar nova senha</label>
                <div class="pass-wrap">
                  <input
                    id="account-pass-confirm-input"
                    type="password"
                    placeholder="Digite a senha novamente"
                  />
                  <button
                    type="button"
                    class="pass-toggle"
                    data-toggle-pass="account-pass-confirm-input"
                  >
                    Mostrar
                  </button>
                </div>
              </div>
              <button class="save-account-btn" id="save-account-btn" type="button">
                Salvar dados
              </button>
            </div>
          </div>
        </div>
        <button class="nav-btn" id="nav-admin-btn" style="display:none">⚙ Admin</button>
        <button class="nav-btn" id="nav-users-btn" style="display:none">👥 Alunos</button>
        <button class="nav-btn" id="nav-checklist-btn" style="display:none">← Checklist</button>
        <button class="nav-btn" id="logout-btn">Sair</button>
      </nav>
      <div id="view-checklist" class="view active">
        <div class="wrap">
          <div class="hero">
            <div class="hero-tag">Revisão rápida</div>
            <h1>Checklist interativo</h1>
            <p id="hero-greeting">Bom estudo!</p>
          </div>
          <div class="prog-bar-wrap">
            <span class="prog-nums" id="prog-nums">0 / 0</span>
            <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
            <span class="prog-pct" id="prog-pct">0%</span>
            <button class="reset-btn" id="reset-progress-btn">Reiniciar</button>
          </div>
          <div id="sections-container"></div>
        </div>
      </div>
      <div id="view-admin" class="view">
        <div class="admin-wrap">
          <div class="admin-header">
            <div>
              <h2>Painel Admin</h2>
              <p>Edite categorias e itens do checklist</p>
            </div>
            <button class="save-btn" id="save-btn">Salvar alterações</button>
          </div>
          <div class="add-cat-box">
            <input id="new-cat-input" placeholder="Nome da nova categoria…"/>
            <select id="new-cat-prio" class="generic-select">
              <option>obrigatório</option>
              <option>importante</option>
              <option>revisar</option>
              <option>atenção máxima</option>
            </select>
            <button class="add-cat-btn" id="add-cat-btn">+ Categoria</button>
          </div>
          <div id="admin-sections"></div>
        </div>
      </div>
      <div id="view-users" class="view">
        <div class="users-wrap">
          <div class="admin-header">
            <div>
              <h2>Alunos cadastrados</h2>
              <p>Progresso de cada aluno no checklist</p>
            </div>
          </div>
          <div id="users-list"><p class="muted-msg">Carregando…</p></div>
        </div>
      </div>
    </div>

      };
    </script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
